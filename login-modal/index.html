<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700&family=Rokkitt:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          sans: ["Mulish", "sans-serif"],
          mono: ["Rokkitt", "monospace"],
        },
      };
    </script>
    <title>email subscription</title>
  </head>
  <body>
    <!-- Global container -->
    <div class="flex items-center justify-center min-h-screen bg-[#FDF1F7]">
      <!-- Card Conteiner  -->
      <div
        class="relative flex flex-col m-6 space-y-10 bg-white shadow-2xl rounded-2xl md:flex-row md:space-y-0 md:m-0"
      >
        <!-- left side -->
        <div
          class="p-6 md:py-10 md:px-10 min-w-[400px] flex flex-col justify-between"
        >
          <!-- top content -->
          <h2 class="font-mono mb-3 text-4xl font-bold">Log in</h2>
          <p class="max-w-sm font-sans font-light text-gray-600">
            Log in to your account to order.
          </p>
          <input
            type="text"
            class="w-full px-4 py-3 border border-gray-300 rounded-md placeholder:font-sans placeholder:font-light focus:outline-none focus:ring-2 focus:ring-[#6C569E]"
            placeholder="Enter your email ddress"
          />
          <!-- middle content -->
          <div
            class="flex flex-col items-center justify-between mt-6 gap-2 md:flex-row md:space-y-0 md:gap-2"
          >
            <div class="font-thin text-[#6C569E]">Forgot password</div>
            <button
              class="w-full md:w-auto px-8 py-3 font-sans font-bold text-white rounded-md bg-[#6C569E] hover:bg-opacity-90 hover:shadow-lg border transition hover:-translate-y-0.5 duration-150"
            >
              <span>Next</span>
            </button>
          </div>
          <!-- border -->
          <div class="mt-12 border-t border-t-gray-300">
            <!-- bottom content -->
            <p class="py-6 text-sm font-thin text-center text-gray-400">
              or log in with
            </p>
            <!-- bottom buttons container -->
            <div
              class="flex flex-col space-x-0 space-y-6 md:flex-row md:space-x-4 md:space-y-0"
            >
              <button
                class="flex items-center justify-center py-2 space-x-3 border border-gray-300 rounded shadow-sm hover:bg-opacity-40 hover:shadow-lg hover:-translate-y-0 transition duration-150 md:w-1/2"
              >
                <img
                  src="../assets/images/facebook.png"
                  alt="facebook"
                  class="w-9"
                />
                <span class="font-thin">Facebook</span>
              </button>
              <button
                class="flex items-center justify-center py-2 space-x-3 border border-gray-300 rounded shadow-sm hover:bg-opacity-40 hover:shadow-lg hover:-translate-y-0 transition duration-150 md:w-1/2"
              >
                <img
                  src="../assets/images/google.png"
                  alt="facebook"
                  class="w-9"
                />
                <span class="font-thin">Google</span>
              </button>
            </div>
          </div>
        </div>
        <!-- right side -->
        <img
          src="../assets/images/subscribe.jpg"
          alt=""
          class="w-[430px] hidden md:block cover rounded-r-2xl"
        />
        <div
          class="group absolute -top-5 right-4 flex items-center justify-center w-10 h-10 bg-gray-200 rounded-full md:bg-white md:top-4 shadow shadow-sm"
        >
          <p class="w-6 h-6 cursor-pointer text-black text-center">X</p>
        </div>
      </div>
    </div>
  </body>
</html>
